# Render Blueprint — only the API web service.
# Does NOT create a managed PostgreSQL because the free tier allows only one DB per account.
# Provide the database connection via DATABASE_URL env var (set manually in Render UI).
#
# After import:
#   1. Render Dashboard → fittrack-api → Environment → set DATABASE_URL to the Internal
#      Database URL of your existing free PostgreSQL (Render → your DB → Connect → Internal).
#   2. Set CORS_ORIGIN to your Vercel domain.
#   3. Manual deploy (Render auto-redeploys on env change).

services:
  - type: web
    name: fittrack-api
    runtime: docker
    plan: free
    region: oregon
    rootDir: fittrack-api
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # PORT is injected by Render (usually 10000) — do NOT set it manually here.
      - key: API_PREFIX
        value: api/v1

      # PostgreSQL — set in Render UI as a single connection string:
      # postgres://user:password@host:port/database
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SYNCHRONIZE
        value: "false"
      - key: DATABASE_LOGGING
        value: "false"

      # Redis disabled by default (free tier has no Redis addon).
      # To enable: provision Upstash Redis and set REDIS_HOST/PORT/PASSWORD,
      # then change REDIS_ENABLED to "true".
      - key: REDIS_ENABLED
        value: "false"

      # JWT secrets (Render generates random values on first deploy)
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: BCRYPT_ROUNDS
        value: "10"

      # CORS — set to your Vercel domain after frontend deploy:
      #   https://sport-app-gold.vercel.app
      - key: CORS_ORIGIN
        sync: false

      # === Mail (password reset) ===
      # If SMTP_HOST is empty, reset emails go to logs only (dev fallback).
      # Production: use Resend / SendGrid / Mailgun / Postmark / Gmail App Password.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_SECURE
        value: "false"
      - key: MAIL_FROM
        value: "FitTrack <noreply@fittrack.app>"
      # APP_URL — твой Vercel-домен. Попадает в ссылку из письма.
      - key: APP_URL
        sync: false
