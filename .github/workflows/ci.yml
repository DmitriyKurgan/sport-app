name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =====================================================================
  # API: lint + типчек + unit + e2e (с реальной PG)
  # =====================================================================
  api:
    name: API (lint + tests + e2e)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fittrack_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: fittrack-api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: fittrack-api/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: E2E
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: postgres
          DATABASE_PASSWORD: postgres
          DATABASE_NAME: fittrack_test
          DATABASE_SYNCHRONIZE: 'false'
          DATABASE_LOGGING: 'false'
          JWT_ACCESS_SECRET: ci-access-secret-256-bit-test-1234567890abcdef
          JWT_REFRESH_SECRET: ci-refresh-secret-256-bit-test-1234567890abcdef
          JWT_ACCESS_EXPIRY: 15m
          JWT_REFRESH_EXPIRY: 7d
          BCRYPT_ROUNDS: '4'
          REDIS_HOST: localhost
          REDIS_PORT: '6379'
        run: npm run test:e2e

  # =====================================================================
  # Web: lint + типчек + build
  # =====================================================================
  web:
    name: Web (type-check + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: fittrack-web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: fittrack-web/package-lock.json

      - name: Install
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
        run: npm run build

  # =====================================================================
  # Docker: проверяем что образы собираются
  # =====================================================================
  docker-build:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [api, web]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build api image
        uses: docker/build-push-action@v5
        with:
          context: ./fittrack-api
          push: false
          tags: fittrack-api:ci
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build web image
        uses: docker/build-push-action@v5
        with:
          context: ./fittrack-web
          push: false
          tags: fittrack-web:ci
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:3001
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
