services:
  # ============================================================
  # PostgreSQL 15
  # ============================================================
  postgres:
    image: postgres:15-alpine
    container_name: fittrack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-fittrack}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_EXPOSED_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres} -d ${DATABASE_NAME:-fittrack}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fittrack-net

  # ============================================================
  # Redis 7 (Bull queues + cache)
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: fittrack-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_EXPOSED_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fittrack-net

  # ============================================================
  # API (NestJS)
  # ============================================================
  api:
    build:
      context: ./fittrack-api
      dockerfile: Dockerfile
    container_name: fittrack-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      API_PREFIX: api/v1
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-fittrack}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      DATABASE_SYNCHRONIZE: "false"
      DATABASE_LOGGING: "false"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?Set JWT_ACCESS_SECRET in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET in .env}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-10}
    ports:
      - "${API_EXPOSED_PORT:-3001}:3001"
    # Entrypoint: ждём PG → миграции → старт
    command: >
      sh -c "
      echo 'Waiting for postgres...' &&
      until node -e 'require(\"net\").connect(5432, \"postgres\").on(\"connect\", () => process.exit(0)).on(\"error\", () => process.exit(1))' 2>/dev/null; do sleep 1; done &&
      echo 'Running migrations...' &&
      node scripts/migrate.js &&
      echo 'Starting API...' &&
      node dist/main.js
      "
    networks:
      - fittrack-net

  # ============================================================
  # PG backup — ежедневный pg_dump в named volume, ротация
  # ============================================================
  postgres-backup:
    image: prodrigestivill/postgres-backup-local:15-alpine
    container_name: fittrack-pg-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${DATABASE_NAME:-fittrack}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_EXTRA_OPTS: "-Z9 --schema=public --blobs"
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      HEALTHCHECK_PORT: 8080
    volumes:
      - postgres-backups:/backups
    networks:
      - fittrack-net

  # ============================================================
  # Caddy reverse-proxy (HTTPS auto-cert + единая точка входа)
  # ============================================================
  caddy:
    image: caddy:2-alpine
    container_name: fittrack-caddy
    restart: unless-stopped
    depends_on:
      - api
      - web
    environment:
      # CADDY_SITE: ":80" для local (без TLS) или "app.example.com" для prod (auto Let's Encrypt)
      CADDY_SITE: ${CADDY_SITE:-:80}
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - fittrack-net

  # ============================================================
  # Web (Next.js)
  # ============================================================
  web:
    build:
      context: ./fittrack-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    container_name: fittrack-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - "${WEB_EXPOSED_PORT:-3000}:3000"
    networks:
      - fittrack-net

volumes:
  postgres-data:
  postgres-backups:
  redis-data:
  caddy-data:
  caddy-config:

networks:
  fittrack-net:
    driver: bridge
